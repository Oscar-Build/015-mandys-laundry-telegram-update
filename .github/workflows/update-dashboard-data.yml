name: Update Dashboard Data (6:10 AM PST)

on:
  schedule:
    # 10 minutes after morning report so GSC data is fresh
    - cron: '10 14 * * *'
  workflow_dispatch:   # run manually from GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write   # needed to commit data.json back to the repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Generate data.json
        run: node scripts/generate-dashboard-data.js
        env:
          WORDPRESS_API_URL:       ${{ secrets.WORDPRESS_API_URL }}
          WORDPRESS_SITE_URL:      ${{ secrets.WORDPRESS_SITE_URL }}
          WORDPRESS_USERNAME:      ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD:  ${{ secrets.WORDPRESS_APP_PASSWORD }}
          GOOGLE_CLIENT_ID:        ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:    ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:    ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_GA4_PROPERTY_ID:  ${{ secrets.GOOGLE_GA4_PROPERTY_ID }}
          SITE_URL:                ${{ secrets.SITE_URL }}

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: update dashboard data $(date -u +%Y-%m-%d)"
          git push
